name: Run Phase 5 Sweep
description: |
  Wraps the per-tier wiring (Bun setup, install, script invocation) for the
  Phase 5 sweep so each tier workflow only declares its own cron + tier name.
  Caller must do `actions/checkout@v4` first so the action.yaml is on disk,
  and must set POSTGRES_URL + COMPANIES_HOUSE_SEED_API_KEY as job-level env.

inputs:
  tier:
    description: "Tier name passed to --tier (no_match | non_exact | exact | public_body)"
    required: true
  max-rows:
    description: "Optional override for the per-run row limit; falls back to the script's tier default"
    required: false
    default: ""
  dry-run:
    description: "Dry run — no DB writes"
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Install dependencies
      shell: bash
      working-directory: apps/web
      run: bun install --frozen-lockfile

    - name: Run Phase 5 sweep
      shell: bash
      env:
        TIER: ${{ inputs.tier }}
        MAX_ROWS: ${{ inputs.max-rows }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        ROWS_FLAG=""
        if [ -n "$MAX_ROWS" ]; then
          ROWS_FLAG="--max-rows=$MAX_ROWS"
        fi
        DRY_FLAG=""
        if [ "$DRY_RUN" = "true" ]; then
          DRY_FLAG="--dry-run"
        fi
        set -o pipefail
        bun apps/web/scripts/phase5-sweep.ts --tier="$TIER" $ROWS_FLAG $DRY_FLAG | tee /tmp/phase5-sweep.log

    - name: Write job summary
      if: always()
      shell: bash
      env:
        TIER: ${{ inputs.tier }}
        DRY_RUN: ${{ inputs.dry-run }}
      run: |
        LOG=/tmp/phase5-sweep.log
        if [ ! -f "$LOG" ]; then exit 0; fi
        extract() { grep -E "^  $1 +:" "$LOG" | tail -n1 | sed -E "s/^  $1 +: //" || true; }
        SELECTED=$(extract selected)
        UPDATED=$(extract updated)
        BUMPED=$(extract bumped)
        QUEUED=$(extract queued)
        LOCK_MISSED=$(extract lock_missed)
        ERRORED=$(extract errored)
        DURATION=$(extract duration)
        DRY_NOTE=""
        if [ "$DRY_RUN" = "true" ]; then
          DRY_NOTE=" — dry run"
        fi
        {
          echo "## Phase 5 Sweep — tier \`$TIER\`${DRY_NOTE}"
          echo ""
          echo "| Metric | Value |"
          echo "| --- | --- |"
          echo "| 🎯 Selected | ${SELECTED:-—} |"
          echo "| ✅ Updated | ${UPDATED:-—} |"
          echo "| ⬆️ Bumped | ${BUMPED:-—} |"
          echo "| 📋 Queued | ${QUEUED:-—} |"
          echo "| 🔒 Lock missed | ${LOCK_MISSED:-—} |"
          echo "| ❌ Errored | ${ERRORED:-—} |"
          echo "| ⏱️ Duration | ${DURATION:-—} |"
        } >> "$GITHUB_STEP_SUMMARY"
