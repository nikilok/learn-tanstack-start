name: Phase 5 Sweep — Tier 3 (exact)

# Lowest recovery value bucket — exact-name matches rarely change. Main
# signal here is rule-5 demotion-rejection (an active CH entity silently
# renames; resolver returns Tier-B/C against the new name; decide() rejects
# the demotion and bumps). ~103k rows total; 1500/run → ~10-week turnover.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      max-rows:
        description: "Override per-run row limit (default 1500)"
        required: false
        type: number
      dry-run:
        description: "Dry run — no DB writes"
        type: boolean
        default: false

concurrency:
  group: phase5-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      COMPANIES_HOUSE_SEED_API_KEY: ${{ secrets.COMPANIES_HOUSE_SEED_API_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sweep
        uses: ./.github/actions/run-phase5-sweep
        with:
          tier: exact
          max-rows: ${{ github.event.inputs.max-rows }}
          dry-run: ${{ github.event.inputs.dry-run }}
