name: Phase 5 Sweep — Tier 1 (no_match)

# Highest recovery value bucket — every re-check is a chance to flip "no
# answer" to a real mapping if CH has incorporated the missing entity since
# the last verification. ~16k rows total; 4000/run → ~4-day full turnover.

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      max-rows:
        description: "Override per-run row limit (default 4000)"
        required: false
        type: number
      dry-run:
        description: "Dry run — no DB writes"
        type: boolean
        default: false

concurrency:
  group: phase5-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      COMPANIES_HOUSE_SEED_API_KEY: ${{ secrets.COMPANIES_HOUSE_SEED_API_KEY }}
      # Optional: override the per-row sleep without redeploying. Set
      # PHASE5_DELAY_MS in repo Settings → Secrets and variables → Actions
      # → Variables. Falls back to the script's DEFAULT_DELAY_MS (2200ms).
      PHASE5_DELAY_MS: ${{ vars.PHASE5_DELAY_MS }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sweep
        uses: ./.github/actions/run-phase5-sweep
        with:
          tier: no_match
          max-rows: ${{ github.event.inputs.max-rows }}
          dry-run: ${{ github.event.inputs.dry-run }}
